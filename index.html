<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colab GGUF Chat Client with Web Search</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Marked.js (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- PDF.js (PDF Text Extractor) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- Prism.js (Syntax Highlighting) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
        <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="sidebar-overlay"></div>
    <div id="app-container">
        <!-- サイドバー -->
        <aside id="sidebar">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #818cf8;"><path d="M12 2a10 10 0 0 1 7.54 16.59c-.45.52-.7 1.2-.7 1.91V22h-13.68v-1.5c0-.71-.25-1.39-.7-1.9A10 10 0 0 1 12 2z"></path><path d="M9 10h6"></path><path d="M9 14h6"></path></svg>
                Colab Chat UI
            </h1>

            <!-- プロバイダ選択 -->
            <div class="settings-group">
                <label for="api-provider">AIプロバイダ</label>
                <select id="api-provider">
                    <option value="colab">Google Colab (Gemma-4)</option>
                    <option value="openai">OpenAI (GPT-4o等)</option>
                    <option value="gemini">Google Gemini</option>
                    <option value="claude">Anthropic Claude</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="groq">Groq</option>
                    <option value="grok">xAI Grok</option>
                    <option value="openrouter">OpenRouter</option>
                    <option value="custom">カスタム接続</option>
                </select>
            </div>

            <!-- APIキー入力欄 -->
            <div class="settings-group" id="api-key-group" style="display: none;">
                <label for="api-key">APIキー</label>
                <div class="password-wrapper" style="position: relative; width: 100%;">
                    <input type="password" id="api-key" placeholder="APIキーを入力..." style="padding-right: 40px;">
                    <button type="button" id="toggle-api-key" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; width: auto; font-size: 1.1rem; outline: none; transition: color 0.2s;">
                        👁️
                    </button>
                </div>
            </div>

            <div class="settings-group">
                <label for="api-url" id="api-url-label">Cloudflare API URL</label>
                <input type="text" id="api-url" placeholder="https://xxxx.trycloudflare.com" value="">
            </div>

            <div class="settings-group">
                <label for="model-select">使用モデル</label>
                <select id="model-select">
                    <option value="">接続設定後に選択してください</option>
                </select>
                <input type="text" id="model-custom" style="display: none; margin-top: 8px;" placeholder="モデル名を手動入力...">
            </div>

            <!-- Web検索スイッチ -->
            <div class="switch-container">
                <span class="switch-label">🔍 Web検索機能 (RAG)</span>
                <label class="switch">
                    <input type="checkbox" id="web-search-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- 過去ログRAGスイッチ -->
            <div class="switch-container">
                <span class="switch-label">📜 過去会話RAG</span>
                <label class="switch">
                    <input type="checkbox" id="history-rag-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- エージェントモードスイッチ -->
            <div class="switch-container">
                <span class="switch-label" title="目標の計画・実行・検証を何度も自律ループで繰り返します">🤖 エージェントモード</span>
                <label class="switch">
                    <input type="checkbox" id="agent-mode-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- AIスキル設定セクション -->
            <div class="settings-group" id="skills-group">
                <label>🔥 AIスキル設定 (指示拡張)</label>
                <div id="skills-list-container" style="background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px; max-height: 180px; overflow-y: auto;">
                    <div style="font-size: 0.8rem; color: var(--text-muted);">ロード中...</div>
                </div>
                
                <!-- スキルインストールフォーム -->
                <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 6px; width: 100%;">
                    <button type="button" id="toggle-install-form-btn" style="background: none; border: none; color: var(--accent-color); font-size: 0.8rem; cursor: pointer; text-align: left; padding: 2px 0; outline: none; display: flex; align-items: center; gap: 4px; width: fit-content; font-weight: 500;">
                        <span>＋ GitHubからスキルをインポート</span>
                    </button>
                    <div id="install-form-container" style="display: none; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 10px; width: 100%; box-sizing: border-box;">
                        <input type="text" id="skill-install-url" placeholder="https://github.com/..." style="font-size: 0.8rem; padding: 8px; background: var(--bg-main); border: 1px solid var(--panel-border); border-radius: 4px; color: var(--text-main); width: 100%; box-sizing: border-box;">
                        <button type="button" id="install-skill-submit-btn" style="font-size: 0.8rem; padding: 8px; background: var(--accent-color); border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: 600; transition: opacity 0.2s; width: 100%; box-sizing: border-box;">
                            インストール / 更新
                        </button>
                        <div id="install-status-msg" style="font-size: 0.75rem; text-align: center; display: none; word-break: break-all;"></div>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <textarea id="system-prompt" rows="8" style="font-size:0.85rem; line-height:1.4;" placeholder="あなたは優秀なAIアシスタントです。">あなたは親切で優秀なAIアシスタントです。作業ディレクトリ内でファイル操作やコマンド実行を行いたい場合は、必ず以下のXMLタグを単独で出力してください。システムが自動で実行し、結果をあなたに差し戻します。ユーザーから「コードをファイルに保存して」「〇〇を作成して」などと指示された際は、通常のコードブロック（```）で回答するのではなく、必ず以下の &lt;write_file&gt; タグを使用して実際のファイルシステムへ書き込みを実行してください。また、Grokなどの推論思考モデルが有効な場合、思考（reasoning）の中だけでなく、必ず最終的な出力メッセージ（Content）の中にこれらのXMLタグを直接出力して記述してください。

【利用可能なツール】
1. ファイルの新規作成・上書き更新:
&lt;write_file path="相対パス"&gt;
ここにファイルの内容をそのまま記述
&lt;/write_file&gt;

2. ファイル内容の読み取り:
&lt;read_file path="相対パス" /&gt;

3. コマンドの実行:
&lt;run_command&gt;
ここに実行したいコマンドを記述
&lt;/run_command&gt;

※ツールを実行した場合、その結果をシステムが自動的に差し戻します。結果を確認した上で思考や次の作業を継続してください。</textarea>
            </div>

            <div class="settings-group" style="flex-direction: row; gap: 10px;">
                <div style="flex: 1;">
                    <label for="temperature">Temp</label>
                    <input type="number" id="temperature" value="0.5" step="0.1" min="0" max="2">
                </div>
                <div style="flex: 1;">
                    <label for="max-tokens">Max Tokens</label>
                    <input type="number" id="max-tokens" value="2048" step="128">
                </div>
            </div>

            <button class="btn btn-secondary" id="clear-btn" style="margin-top: 10px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                会話履歴をクリア
            </button>

            <!-- ステータス -->
            <div id="status-indicator">
                <div class="status-dot"></div>
                <span id="status-text">未接続</span>
            </div>
        </aside>

        <!-- メインチャットエリア -->
        <main id="chat-area">
            <header id="chat-header">
                <button type="button" class="menu-toggle-btn" id="menu-toggle">☰</button>
                <span class="model-badge" id="header-model-name">モデル未選択</span>
                <div class="tab-container" style="display: flex; gap: 10px; margin-left: auto;">
                    <button class="tab-btn active" id="tab-chat-btn" style="background: transparent; border: none; color: var(--text-main); font-weight: 600; font-size: 0.95rem; cursor: pointer; padding: 6px 12px; border-bottom: 2px solid var(--accent-color); transition: all 0.2s; outline: none;">💬 チャット</button>
                    <button class="tab-btn" id="tab-term-btn" style="background: transparent; border: none; color: var(--text-muted); font-weight: 500; font-size: 0.95rem; cursor: pointer; padding: 6px 12px; border-bottom: 2px solid transparent; transition: all 0.2s; outline: none;">🐚 ターミナル</button>
                </div>
            </header>

            <!-- チャットパネル -->
            <div id="chat-panel" style="display: flex; flex-direction: column; flex: 1; height: calc(100% - 70px); min-height: 0;">
                <!-- メッセージリスト -->
                <div id="message-list" style="flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px;">
                    <div class="message-wrapper">
                        <div class="message message-assistant">
                            こんにちは！接続URLを入力して、AIとの会話を開始してください。<br>
                            左側の<b>「Web検索機能」</b>をONにすると、自動的にWebから最新の情報を検索して踏まえた上で回答できるようになります。
                        </div>
                    </div>
                </div>

                <!-- 入力エリア -->
                <div id="input-container">
                    <div class="input-box-wrapper" style="position: relative; display: flex; flex-direction: column; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 12px; overflow: hidden;">
                        <!-- 添付ファイルのプレビューコンテナ -->
                        <div id="preview-container" style="display: none; flex-wrap: wrap; gap: 8px; padding: 8px 12px; background: rgba(0,0,0,0.15); border-bottom: 1px solid rgba(255,255,255,0.05); max-height: 120px; overflow-y: auto;"></div>
                        
                        <textarea id="chat-input" placeholder="メッセージを入力... (Ctrl + Enterで送信) またはファイルをドラッグ＆ドロップ" style="border: none; background: transparent; padding: 12px; resize: none; min-height: 60px; color: var(--text-main); font-size: 0.95rem; line-height: 1.5; outline: none;"></textarea>
                        <div class="input-footer" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(0,0,0,0.05);">
                            <!-- クリップ（添付）ボタン -->
                            <button id="attach-btn" type="button" style="background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; transition: background 0.2s, color 0.2s;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                </svg>
                            </button>
                            <input type="file" id="file-input" style="display: none;" multiple accept="image/*,text/*,.pdf,.csv">
                            
                            <button class="send-btn" id="send-btn">
                                <svg viewBox="0 0 24 24">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ターミナルパネル -->
            <div id="terminal-panel" style="display: none; flex-direction: column; flex: 1; height: calc(100% - 70px); padding: 32px; box-sizing: border-box; overflow-y: auto; min-height: 0;">
                <div style="background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 20px; height: 100%; box-sizing: border-box; backdrop-filter: blur(10px);">
                    <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 600; color: #a5b4fc; display: flex; align-items: center; gap: 8px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                        リモートシェル実行
                    </h2>
                    
                    <div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center;">
                        <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase;">クイックコマンド:</span>
                        <button class="btn btn-secondary" onclick="runQuickCommand('nvidia-smi')" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 6px;">nvidia-smi (GPU)</button>
                        <button class="btn btn-secondary" onclick="runQuickCommand('ps aux | grep -E \'server.py|llama\'')" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 6px;">ps aux (プロセス)</button>
                        <button class="btn btn-secondary" onclick="runQuickCommand('df -h')" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 6px;">df -h (ディスク)</button>
                        <button class="btn btn-secondary" onclick="runQuickCommand('free -m')" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 6px;">free -m (メモリ)</button>
                        <button class="btn btn-secondary" onclick="runQuickCommand('ls -la')" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 6px;">ls -la (ファイル)</button>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="terminal-input" placeholder="実行したいコマンドを入力してください... (例: pwd)" style="flex: 1;">
                        <button class="btn" id="terminal-run-btn" style="padding: 0 20px;">実行</button>
                    </div>

                    <div id="terminal-output" style="flex: 1; background: #07080d; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 16px; font-family: 'Fira Code', monospace; font-size: 0.85rem; color: #a3e635; white-space: pre-wrap; overflow-y: auto; box-shadow: inset 0 2px 8px rgba(0,0,0,0.8); line-height: 1.5;">コマンド実行結果がここに表示されます...</div>
                </div>
            </div>
        </main>
    </div>

        <script src="/app.js" defer></script>
</body>
</html>
